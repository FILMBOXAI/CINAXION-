<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="google-site-verification" content="MVta7fYIufFXDOm8V4xosjfixFWA8pgXkMYCqivCvJE" />

  <title>CINAXION - Nueva Era</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0f1115;
      --panel-color: #161920;
      --accent: #3b82f6;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: 1px solid rgba(255,255,255,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      overflow-x: hidden;
      padding-top: 110px; /* Espacio para el panel */
    }

    /* --- LOADER --- */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg-color);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: all 0.6s ease;
    }

    .loader-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .loader-progress {
      width: 50%;
      height: 100%;
      background: var(--accent);
      position: absolute;
      animation: loading-move 1.5s infinite ease-in-out;
    }

    @keyframes loading-move {
      0% { left: -50%; }
      100% { left: 100%; }
    }

    /* --- HEADER: EL TRUCO PARA QUE NO SE VEAN LAS CARDS --- */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100px; /* Altura que cubre el área superior */
      background-color: var(--bg-color); /* Color de fondo sólido igual al body */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }

    /* EL PANEL FLOTANTE (ESTILO DE TU IMAGEN) */
    .floating-panel {
      background: var(--panel-color);
      width: 92%;
      max-width: 1200px;
      padding: 12px 25px;
      border-radius: 24px; /* Forma de pastilla */
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .logo img {
      height: 32px;
      width: auto;
      display: block;
    }

    .search-box {
      background: var(--bg-color);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      width: 60%;
      max-width: 350px;
      border: var(--border);
    }

    #search {
      background: transparent;
      border: none;
      color: white;
      padding: 10px 0;
      width: 100%;
      font-size: 14px;
      outline: none;
    }

    /* --- CUERPO --- */
    .app-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .marquee {
      color: var(--text-secondary);
      font-size: 12px;
      padding: 10px 0;
      overflow: hidden;
      margin-bottom: 20px;
      border-bottom: var(--border);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .marquee span {
      display: inline-block;
      white-space: nowrap;
      animation: marquee-roll 25s linear infinite;
    }

    @keyframes marquee-roll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* --- GRID --- */
    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      padding-bottom: 50px;
    }

    .card {
      background: var(--panel-color);
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      border: var(--border);
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 12px;
      background: linear-gradient(to top, var(--panel-color) 30%, transparent);
      position: absolute;
      bottom: 0;
      width: 100%;
    }

    .card h4 {
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* FOOTER */
    .tmdb-footer {
      margin-top: 40px;
      padding: 40px 20px;
      text-align: center;
      background: var(--panel-color);
      color: var(--text-secondary);
      font-size: 11px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      body { padding-top: 90px; }
      header { height: 90px; }
      .floating-panel { padding: 10px 15px; border-radius: 20px; }
      .movies { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .card h4 { font-size: 10px; }
      .search-box { width: 55%; }
    }
  </style>
</head>
<body>

<div id="loader">
  <div style="margin-bottom: 20px;">
    <img src="https://i.postimg.cc/4dt12H7s/Picsart_26_03_04_18_18_13_389.png" style="height: 40px;">
  </div>
  <div class="loader-bar">
    <div class="loader-progress"></div>
  </div>
</div>

<header>
  <!-- Este es el panel estilo "Isla" de tu imagen -->
  <div class="floating-panel">
    <div class="logo">
      <img src="https://i.postimg.cc/4dt12H7s/Picsart_26_03_04_18_18_13_389.png" alt="CINAXION">
    </div>
    
    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar título...">
    </div>
  </div>
</header>

<div class="app-wrapper">
  <div class="marquee">
    <span>Cargando lo mejor del séptimo arte • Actualizaciones diarias • Sin límites • Disfruta en CINAXION</span>
  </div>

  <section class="movies" id="grid"></section>
</div>

<footer class="tmdb-footer">
  <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
  <p>Cinaxion Engine 2.0 &copy; 2026</p>
</footer>

<script src="tmdb.js"></script>

<script>
  window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    if (sessionStorage.getItem("loaderShown")) {
      loader.style.display = "none";
    } else {
      setTimeout(() => {
        loader.style.opacity = 0;
        setTimeout(() => loader.style.display = "none", 600);
      }, 2000);
      sessionStorage.setItem("loaderShown", "true");
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    if (typeof loadHome === "function") {
      loadHome();
    }
  });

  window.addEventListener("beforeunload", () => {
    localStorage.setItem("scrollPos", window.scrollY);
  });

  document.addEventListener("DOMContentLoaded", () => {
    const savedPos = localStorage.getItem("scrollPos");
    if (savedPos) {
      window.scrollTo({ top: parseInt(savedPos), behavior: 'instant' });
    }
  });

  // 🔍 Referencia al input
const input = document.getElementById("search");

// 🔥 Estado de búsqueda
let busquedaActiva = false;

// 👉 Cuando el usuario toca el buscador
input.addEventListener("focus", () => {
  if (!busquedaActiva) {
    history.pushState({ search: true }, "");
    busquedaActiva = true;
  }
});

// 🧹 Función para limpiar + cerrar teclado
function limpiarBuscador() {
  input.value = "";

  // Quitar cursor
  input.blur();

  // Refuerzo para móviles
  setTimeout(() => {
    document.activeElement.blur();
  }, 50);

  // Hack para cerrar teclado en Android
  input.setAttribute("readonly", true);

  setTimeout(() => {
    input.removeAttribute("readonly");
  }, 150);
}

// 🔙 Detectar botón atrás
window.addEventListener("popstate", () => {
  if (busquedaActiva) {
    limpiarBuscador();
    busquedaActiva = false;
  }
});
</script>

</body>
</html>
